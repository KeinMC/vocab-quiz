<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Vocab Quiz Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap');
:root{--bg:#0a0a0f;--s:#13131a;--s2:#1c1c26;--bd:rgba(255,255,255,0.08);--t:#f0f0f5;--m:#7a7a90;--a:#7c6af7;--a2:#4ecdc4;--err:#ff6b6b;--ok:#4ecdc4;--r:14px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;min-height:-webkit-fill-available;overscroll-behavior:none;-webkit-overflow-scrolling:touch}
.hdr{padding:52px 20px 0;background:linear-gradient(180deg,#1a1530 0%,transparent 100%)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.app-title{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-0.5px}
.badge{background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--a2);font-weight:500}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-top:4px}
.tab{flex:1;padding:10px 4px;background:none;border:none;border-bottom:2px solid transparent;color:var(--m);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.tab.on{color:var(--a);border-bottom-color:var(--a)}
.pane{display:none;padding:20px}
.pane.on{display:block}
.card{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px}
.lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--m);margin-bottom:10px;display:block}
select{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:10px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:15px;padding:11px 14px;outline:none;-webkit-appearance:none;appearance:none}
.freq-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fq{padding:12px 8px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;color:var(--m);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none;text-align:center}
.fq.on{background:rgba(124,106,247,.15);border-color:var(--a);color:var(--a);font-weight:500}
.time-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.time-row input[type=time]{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:10px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:15px;padding:11px 14px;outline:none;color-scheme:dark}
.del-btn{width:38px;height:38px;background:none;border:1px solid var(--bd);border-radius:10px;color:var(--err);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation}
.add-btn{width:100%;padding:10px;background:none;border:1px dashed var(--bd);border-radius:10px;color:var(--m);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;touch-action:manipulation;margin-top:4px}
.pri{width:100%;padding:14px;background:var(--a);border:none;border-radius:var(--r);color:#fff;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;touch-action:manipulation;margin-top:8px;-webkit-appearance:none}
.pri:disabled{opacity:.35;cursor:not-allowed}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center}
.stat-n{font-size:28px;font-weight:600;color:var(--a)}
.stat-l{font-size:12px;color:var(--m);margin-top:2px}
.word-item{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:10px}
.w-en{font-family:'DM Serif Display',serif;font-size:20px;color:var(--t);margin-bottom:2px}
.w-vn{font-size:14px;color:var(--a2);margin-bottom:10px;font-weight:500}
.w-det{font-size:13px;color:var(--m);line-height:1.6;margin-bottom:4px}
.w-det b{color:var(--t);font-weight:500}
.w-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(124,106,247,.15);color:var(--a);margin-bottom:8px}
.day-lbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--m);margin:16px 0 8px}
.empty{text-align:center;padding:48px 20px;color:var(--m);font-size:15px;line-height:1.7}
.empty-icon{font-size:48px;margin-bottom:12px}
/* QUIZ */
.prog-wrap{height:3px;background:var(--s2);border-radius:2px;margin-bottom:24px;overflow:hidden}
.prog-fill{height:100%;background:var(--a);border-radius:2px;transition:width .4s}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.q-cnt{font-size:13px;color:var(--m)}
.q-sc{background:rgba(78,205,196,.15);color:var(--a2);font-size:13px;font-weight:500;padding:4px 12px;border-radius:20px}
.q-word{font-family:'DM Serif Display',serif;font-size:36px;text-align:center;padding:24px 0 8px;line-height:1.1}
.q-hint{text-align:center;font-size:13px;color:var(--m);margin-bottom:28px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{width:100%;padding:16px;background:var(--s);border:1px solid var(--bd);border-radius:var(--r);color:var(--t);font-family:'DM Sans',sans-serif;font-size:15px;text-align:left;cursor:pointer;touch-action:manipulation;line-height:1.4;-webkit-user-select:none;user-select:none}
.opt.correct{background:rgba(78,205,196,.1);border-color:var(--ok);color:var(--ok)}
.opt.wrong{background:rgba(255,107,107,.1);border-color:var(--err);color:var(--err)}
.opt:disabled{cursor:default}
.res-msg{margin-top:16px;padding:14px;border-radius:var(--r);font-size:14px;line-height:1.6}
.res-msg.ok{background:rgba(78,205,196,.1);color:var(--a2);border:1px solid rgba(78,205,196,.2)}
.res-msg.no{background:rgba(255,107,107,.1);color:var(--err);border:1px solid rgba(255,107,107,.2)}
.next-btn{width:100%;margin-top:12px;padding:14px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);color:var(--t);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;touch-action:manipulation}
.big-score{font-family:'DM Serif Display',serif;font-size:72px;color:var(--a);text-align:center;padding-top:40px}
.score-lbl{font-size:16px;color:var(--m);text-align:center;margin:4px 0 32px}
.filter-row{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.filter-btn{flex-shrink:0;padding:6px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:20px;color:var(--m);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;touch-action:manipulation;white-space:nowrap}
.filter-btn.on{background:rgba(124,106,247,.15);border-color:var(--a);color:var(--a)}
.search-inp{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:10px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:15px;padding:10px 14px;outline:none;margin-bottom:12px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-row">
    <div class="app-title">Vocab Quiz Pro</div>
    <div class="badge" id="hdr-badge">0 từ</div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="goTab('schedule',this)">⏰ Lịch học</button>
    <button class="tab" onclick="goTab('words',this)">📚 Từ vựng</button>
    <button class="tab" onclick="goTab('quiz',this)">🧠 Quiz</button>
  </div>
</div>

<!-- SCHEDULE -->
<div id="tab-schedule" class="pane on">
  <div class="card">
    <span class="lbl">🏢 Chọn ngành nghề</span>
    <select id="industry-sel" onchange="onIndustryChange()">
      <option value="">-- Chọn ngành của bạn --</option>
      <option value="it">💻 Công nghệ thông tin (IT)</option>
      <option value="marketing">📣 Marketing & Truyền thông</option>
      <option value="finance">💰 Tài chính & Kế toán</option>
      <option value="hr">👥 Nhân sự (HR)</option>
      <option value="sales">🤝 Kinh doanh & Bán hàng</option>
      <option value="business">🏢 Văn phòng & Quản lý chung</option>
      <option value="healthcare">🏥 Y tế & Chăm sóc sức khỏe</option>
      <option value="logistics">🚚 Logistics & Chuỗi cung ứng</option>
      <option value="legal">⚖️ Pháp lý & Hợp đồng</option>
      <option value="education">🎓 Giáo dục & Đào tạo</option>
      <option value="construction">🏗️ Xây dựng & Bất động sản</option>
    </select>
    <div id="industry-info" style="margin-top:10px;font-size:13px;color:var(--a2);display:none"></div>
  </div>
  <div class="card">
    <span class="lbl">🔔 Giờ thông báo (tối đa 5)</span>
    <div id="time-list"></div>
    <button class="add-btn" id="add-time-btn" onclick="addTime()">+ Thêm giờ học</button>
  </div>
  <div class="card">
    <span class="lbl">🔁 Số lần nhắc mỗi ngày</span>
    <div class="freq-grid">
      <button class="fq on" onclick="setFreq(1,this)">1 lần / ngày</button>
      <button class="fq" onclick="setFreq(2,this)">2 lần / ngày</button>
      <button class="fq" onclick="setFreq(3,this)">3 lần / ngày</button>
      <button class="fq" onclick="setFreq(5,this)">5 lần / ngày</button>
    </div>
  </div>
  <button class="pri" onclick="saveSettings()">💾 Lưu cài đặt</button>
</div>

<!-- WORDS -->
<div id="tab-words" class="pane">
  <div class="stats">
    <div class="stat"><div class="stat-n" id="st-total">0</div><div class="stat-l">Từ đã học</div></div>
    <div class="stat"><div class="stat-n" id="st-days">0</div><div class="stat-l">Ngày học</div></div>
  </div>
  <input type="text" class="search-inp" id="search-inp" placeholder="🔍 Tìm từ vựng..." oninput="renderWords()">
  <div class="filter-row" id="filter-row"></div>
  <div id="word-list"></div>
</div>

<!-- QUIZ -->
<div id="tab-quiz" class="pane">
  <div id="quiz-area"></div>
</div>

<script>
// ══════════════════════════════════════
// DATABASE
// ══════════════════════════════════════
var DB = {};

DB.it = [
  {word:"Algorithm",meaning:"Thuật toán",example:"We need a better algorithm to sort this data.",situation:"Họp kỹ thuật, code review",mistake:"Không phân biệt được algorithm vs code",tip:"Algo = công thức giải quyết vấn đề",options:["Giao diện người dùng","Thuật toán","Cơ sở dữ liệu","Máy chủ"],answer:1},

  {word:"Cache",meaning:"Bộ nhớ đệm tạm thời",example:"Clear the cache to fix the display issue.",situation:"Hỗ trợ kỹ thuật, debug",mistake:"Đọc sai thành 'catch'",tip:"Cache = kho tạm để truy cập nhanh hơn",options:["Mật khẩu","Bộ nhớ đệm tạm thời","Kết nối mạng","Màn hình hiển thị"],answer:1},

  {word:"Deployment",meaning:"Triển khai phần mềm lên môi trường thực",example:"The deployment to production is scheduled for Friday.",situation:"Lên kế hoạch, báo cáo",mistake:"Nhầm deployment với installation",tip:"Deploy = đưa code lên server thật",options:["Triển khai phần mềm lên môi trường thực","Viết code mới","Họp nhóm phát triển","Sao lưu dữ liệu"],answer:0},
  {word:"Encryption",meaning:"Mã hóa dữ liệu",example:"All passwords are stored with encryption.",situation:"Báo cáo bảo mật, email kỹ thuật",mistake:"Nhầm encryption với compression",tip:"En-crypt = khóa dữ liệu bằng mật mã",options:["Nén dữ liệu","Sao lưu dữ liệu","Mã hóa dữ liệu","Truyền dữ liệu"],answer:2},

  {word:"Git",meaning:"Hệ thống quản lý phiên bản code",example:"Please commit your changes to Git before leaving.",situation:"Làm việc nhóm, quản lý code",mistake:"Nhầm Git với GitHub",tip:"Git = lịch sử toàn bộ thay đổi code",options:["Ngôn ngữ lập trình","Công cụ thiết kế","Hệ thống quản lý phiên bản code","Trình duyệt web"],answer:2},

DB.marketing = [
  {word:"Brand awareness",meaning:"Độ nhận diện thương hiệu",example:"Our campaign increased brand awareness by 40%.",situation:"Báo cáo marketing, họp chiến lược",mistake:"Nhầm brand awareness với brand image",tip:"Aware = nhận biết = bao nhiêu người biết thương hiệu",options:["Doanh thu bán hàng","Độ nhận diện thương hiệu","Lợi nhuận thương hiệu","Chi phí quảng cáo"],answer:1},

  {word:"Engagement rate",meaning:"Tỷ lệ tương tác",example:"Our Instagram engagement rate is above industry average.",situation:"Báo cáo social media, họp marketing",mistake:"Nhầm engagement với reach",tip:"Engage = tương tác = like, comment, share",options:["Số lượng người theo dõi","Tỷ lệ tương tác","Số lượng bài đăng","Chi phí quảng cáo"],answer:1},

// ══════════════════════════════════════
var S = {times:['12:00'],freq:1,industry:'',words:[],qIdx:0,qList:[],qScore:0,answered:false,filterIndustry:'all'};
try{var _s=JSON.parse(localStorage.getItem('vqp')||'{}');Object.assign(S,_s);}catch(e){}
function save(){try{localStorage.setItem('vqp',JSON.stringify(S));}catch(e){}}

// ══════════════════════════════════════
// TABS
// ══════════════════════════════════════
function goTab(name,btn){
  document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById('tab-'+name).classList.add('on');
  btn.classList.add('on');
  if(name==='words') renderWords();
  if(name==='quiz') initQuiz();
  updateBadge();
}

// ══════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════
function renderTimes(){
  var el=document.getElementById('time-list');
  el.innerHTML=S.times.map(function(t,i){
    return '<div class="time-row"><input type="time" value="'+t+'" onchange="S.times['+i+']=this.value">'
      +(S.times.length>1?'<button class="del-btn" onclick="removeTime('+i+')">✕</button>':'')
      +'</div>';
  }).join('');
  document.getElementById('add-time-btn').style.display=S.times.length>=5?'none':'block';
}
function addTime(){if(S.times.length>=5)return;S.times.push('08:00');renderTimes();}
function removeTime(i){S.times.splice(i,1);renderTimes();}
function setFreq(n,btn){S.freq=n;document.querySelectorAll('.fq').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');}
function onIndustryChange(){
  var val=document.getElementById('industry-sel').value;
  var info=document.getElementById('industry-info');
  if(val && DB[val]){
    info.style.display='block';
    info.textContent='✓ '+DB[val].length+' từ vựng có sẵn cho ngành này';
  } else { info.style.display='none'; }
}
function saveSettings(){
  S.industry=document.getElementById('industry-sel').value;
  if(!S.industry){alert('Vui lòng chọn ngành nghề!');return;}
  // Load words from DB
  var existing = S.words.map(function(w){return w.word;});
  var newWords = (DB[S.industry]||[]).filter(function(w){return existing.indexOf(w.word)===-1;});
  newWords = newWords.map(function(w){var r=Object.assign({},w);r.industry=S.industry;r.learned=false;return r;});
  S.words = S.words.concat(newWords);
  save();
  var b=document.querySelector('.pri');
  b.textContent='✅ Đã lưu! '+newWords.length+' từ mới được thêm'; b.disabled=true;
  updateBadge();
  setTimeout(function(){b.textContent='💾 Lưu cài đặt';b.disabled=false;},2000);
}
function updateBadge(){
  document.getElementById('hdr-badge').textContent=S.words.length+' từ';
  var st=document.getElementById('st-total');
  var sd=document.getElementById('st-days');
  if(st) st.textContent=S.words.length;
  if(sd) sd.textContent=Object.keys(INDUSTRY_NAMES).filter(function(k){return (DB[k]||[]).some(function(w){return S.words.some(function(sw){return sw.word===w.word;});});}).length;
}

// ══════════════════════════════════════
// WORDS
// ══════════════════════════════════════
function renderWords(){
  updateBadge();
  renderFilters();
  var el=document.getElementById('word-list');
  var query=(document.getElementById('search-inp')||{value:''}).value.toLowerCase();
  var filtered=S.words.filter(function(w){
    var matchSearch=!query||w.word.toLowerCase().indexOf(query)>-1||w.meaning.toLowerCase().indexOf(query)>-1;
    var matchFilter=S.filterIndustry==='all'||w.industry===S.filterIndustry;
    return matchSearch&&matchFilter;
  });
  if(!filtered.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📚</div>'+(S.words.length?'Không tìm thấy từ phù hợp.':'Hãy chọn ngành và lưu cài đặt để bắt đầu!')+'</div>';
    return;
  }
  var grouped={};
  filtered.forEach(function(w){var k=w.industry||'other';if(!grouped[k])grouped[k]=[];grouped[k].push(w);});
  var html='';
  Object.keys(grouped).forEach(function(k){
    html+='<div class="day-lbl">'+(INDUSTRY_NAMES[k]||k)+' — '+grouped[k].length+' từ</div>';
    grouped[k].forEach(function(w){
      html+='<div class="word-item">'
        +'<span class="w-tag">'+(INDUSTRY_NAMES[w.industry]||'')+'</span>'
        +'<div class="w-en">'+w.word+'</div>'
        +'<div class="w-vn">'+w.meaning+'</div>';
      if(w.example) html+='<div class="w-det"><b>Ví dụ:</b> '+w.example+'</div>';
      if(w.situation) html+='<div class="w-det"><b>Dùng khi:</b> '+w.situation+'</div>';
      if(w.mistake) html+='<div class="w-det" style="color:rgba(255,107,107,.8)"><b>Lỗi hay gặp:</b> '+w.mistake+'</div>';
      if(w.tip) html+='<div class="w-det" style="color:rgba(78,205,196,.8)"><b>Ghi nhớ:</b> '+w.tip+'</div>';
      html+='</div>';
    });
  });
  el.innerHTML=html;
}
function renderFilters(){
  var el=document.getElementById('filter-row');
  var industries=[...new Set(S.words.map(function(w){return w.industry;}).filter(Boolean))];
  var html='<button class="filter-btn'+(S.filterIndustry==='all'?' on':'')+'" onclick="setFilter(\'all\',this)">Tất cả ('+S.words.length+')</button>';
  industries.forEach(function(k){
    var cnt=S.words.filter(function(w){return w.industry===k;}).length;
    html+='<button class="filter-btn'+(S.filterIndustry===k?' on':'')+'" onclick="setFilter(\''+k+'\',this)">'+(INDUSTRY_NAMES[k]||k)+' ('+cnt+')</button>';
  });
  el.innerHTML=html;
}
function setFilter(k,btn){
  S.filterIndustry=k;
  renderWords();
}

// ══════════════════════════════════════
// QUIZ
// ══════════════════════════════════════
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function initQuiz(){
  var el=document.getElementById('quiz-area');
  if(!S.words.length){el.innerHTML='<div class="empty"><div class="empty-icon">🧠</div>Chưa có từ để luyện.<br>Hãy chọn ngành và lưu cài đặt trước!</div>';return;}
  if(!S.qList.length||S.qIdx>=Math.min(S.qList.length,10)){S.qList=shuffle(S.words);S.qIdx=0;S.qScore=0;}
  renderQ();
}
function renderQ(){
  var total=Math.min(S.qList.length,10);
  var w=S.qList[S.qIdx];
  var pct=Math.round((S.qIdx/total)*100);
  S.answered=false;
  var opts=(w.options||[w.meaning,'...','...','...']).map(function(o,i){
    return '<button class="opt" onclick="checkAns('+i+','+w.answer+',this)">'+o+'</button>';
  }).join('');
  document.getElementById('quiz-area').innerHTML=
    '<div class="prog-wrap"><div class="prog-fill" style="width:'+pct+'%"></div></div>'
    +'<div class="q-meta"><span class="q-cnt">'+(S.qIdx+1)+' / '+total+'</span><span class="q-sc">+'+S.qScore+'</span></div>'
    +'<div class="q-word">'+w.word+'</div>'
    +'<div class="q-hint">'+(INDUSTRY_NAMES[w.industry]||'')+' — Chọn nghĩa đúng</div>'
    +'<div class="opts">'+opts+'</div>'
    +'<div id="q-res"></div>';
}
function checkAns(chosen,correct,btn){
  if(S.answered)return;
  S.answered=true;
  document.querySelectorAll('.opt').forEach(function(b,i){b.disabled=true;if(i===correct)b.classList.add('correct');else if(i===chosen&&chosen!==correct)b.classList.add('wrong');});
  var w=S.qList[S.qIdx];
  var ok=chosen===correct;
  if(ok)S.qScore++;
  var msg=ok?'✅ Chính xác! '+(w.tip?'💡 '+w.tip:''):'❌ Chưa đúng — "'+w.word+'" nghĩa là: '+w.meaning+(w.tip?' | 💡 '+w.tip:'');
  var total=Math.min(S.qList.length,10);
  document.getElementById('q-res').innerHTML=
    '<div class="res-msg '+(ok?'ok':'no')+'">'+msg+'</div>'
    +'<button class="next-btn" onclick="nextQ()">'+(S.qIdx+1>=total?'Xem kết quả →':'Tiếp theo →')+'</button>';
  save();
}
function nextQ(){
  S.qIdx++;
  var total=Math.min(S.qList.length,10);
  if(S.qIdx>=total){
    var pct=Math.round((S.qScore/total)*100);
    document.getElementById('quiz-area').innerHTML=
      '<div class="big-score">'+S.qScore+'/'+total+'</div>'
      +'<div class="score-lbl">'+(pct>=80?'🎉 Xuất sắc!':pct>=50?'💪 Khá tốt!':'📖 Cần ôn thêm nhé')+'</div>'
      +'<button class="pri" onclick="S.qList=[];S.qIdx=0;S.qScore=0;save();initQuiz()">🔁 Luyện lại</button>';
    return;
  }
  renderQ();
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
if(S.industry) document.getElementById('industry-sel').value=S.industry;
renderTimes();
updateBadge();
</script>
</body>
</html>
