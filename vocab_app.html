<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Vocab Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f5;
    --muted: #7a7a90;
    --accent: #7c6af7;
    --accent2: #4ecdc4;
    --danger: #ff6b6b;
    --success: #4ecdc4;
    --r: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
  }

  /* ── HEADER ── */
  .header {
    padding: 52px 20px 16px;
    background: linear-gradient(180deg, #1a1530 0%, transparent 100%);
    position: relative;
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .app-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); letter-spacing: -0.5px; }
  .streak-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--accent2);
    font-weight: 500;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    padding: 0 20px;
    gap: 4px;
    margin: 12px 0 0;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 10px 4px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    -webkit-appearance: none;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  .tab.on { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── CONTENT ── */
  .content { padding: 20px; display: none; }
  .content.on { display: block; }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* ── FORM ELEMENTS ── */
  input[type=text], input[type=time], select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 11px 14px;
    outline: none;
    -webkit-appearance: none;
  }
  input[type=text]:focus, input[type=time]:focus {
    border-color: var(--accent);
  }
  input[type=time] { color-scheme: dark; }

  .time-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .time-row input { flex: 1; }
  .del-btn {
    width: 38px; height: 38px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--danger);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .add-btn {
    width: 100%;
    padding: 10px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    margin-top: 4px;
    -webkit-appearance: none;
    touch-action: manipulation;
  }

  .freq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .freq-btn {
    padding: 12px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all .15s;
    -webkit-appearance: none;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  .freq-btn.on {
    background: rgba(124,106,247,0.15);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }

  .primary-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: var(--r);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .15s, transform .1s;
    -webkit-appearance: none;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  .ghost-btn {
    width: 100%;
    padding: 13px;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 12px;
    transition: background .15s;
    -webkit-appearance: none;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── STATS ── */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 14px;
    text-align: center;
  }
  .stat-n { font-size: 28px; font-weight: 600; color: var(--accent); }
  .stat-l { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ── WORD CARDS ── */
  .word-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px;
    margin-bottom: 10px;
    animation: fadeUp .3s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
  .w-en { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); margin-bottom: 2px; }
  .w-vn { font-size: 14px; color: var(--accent2); margin-bottom: 10px; font-weight: 500; }
  .w-detail { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 4px; }
  .w-detail b { color: var(--text); font-weight: 500; }
  .w-tag {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(124,106,247,0.15);
    color: var(--accent);
    margin-bottom: 8px;
  }
  .w-mistake { color: rgba(255,107,107,0.8); }
  .w-tip { color: rgba(78,205,196,0.8); }

  /* ── LOADING SPINNER ── */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: -3px;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── QUIZ ── */
  .quiz-wrap { padding-top: 8px; }
  .progress-bar-wrap {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }
  .quiz-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .quiz-counter { font-size: 13px; color: var(--muted); }
  .quiz-score {
    background: rgba(78,205,196,0.15);
    color: var(--accent2);
    font-size: 13px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .quiz-word {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: var(--text);
    text-align: center;
    padding: 24px 0 8px;
    line-height: 1.1;
  }
  .quiz-hint { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .opts { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    width: 100%;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    text-align: left;
    cursor: pointer;
    transition: all .15s;
    line-height: 1.4;
  }
  .opt:active { transform: scale(0.99); }
  .opt.correct { background: rgba(78,205,196,0.1); border-color: var(--success); color: var(--success); }
  .opt.wrong { background: rgba(255,107,107,0.1); border-color: var(--danger); color: var(--danger); }
  .opt:disabled { cursor: default; }
  .result-msg {
    margin-top: 16px;
    padding: 14px;
    border-radius: var(--r);
    font-size: 14px;
    line-height: 1.6;
    animation: fadeUp .25s ease;
  }
  .result-msg.ok { background: rgba(78,205,196,0.1); color: var(--accent2); border: 1px solid rgba(78,205,196,0.2); }
  .result-msg.no { background: rgba(255,107,107,0.1); color: var(--danger); border: 1px solid rgba(255,107,107,0.2); }
  .next-btn {
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
  }
  .score-screen { text-align: center; padding: 40px 0; }
  .big-score { font-family: 'DM Serif Display', serif; font-size: 72px; color: var(--accent); }
  .score-label { font-size: 16px; color: var(--muted); margin-top: 4px; margin-bottom: 32px; }

  /* ── PROMPT PREVIEW ── */
  .prompt-pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    margin-top: 10px;
    max-height: 120px;
    overflow-y: auto;
  }
  .copy-btn {
    margin-top: 8px;
    padding: 8px 14px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }

  .day-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 16px 0 8px;
  }
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="app-title">Vocab Quiz</div>
    <div class="streak-badge" id="streak-badge">0 từ</div>
  </div>
</div>

<div class="tabs">
  <button class="tab on" onclick="tab('schedule',this)">⏰ Lịch học</button>
  <button class="tab" onclick="tab('words',this)">📚 Từ vựng</button>
  <button class="tab" onclick="tab('quiz',this)">🧠 Quiz</button>
</div>

<!-- ════ TAB: SCHEDULE ════ -->
<div id="tab-schedule" class="content on">

  <div class="card">
    <div class="card-label">🏢 Ngành nghề của bạn</div>
    <input type="text" id="industry" placeholder="vd: Marketing, IT, Kế toán, Bán lẻ...">
  </div>

  <div class="card">
    <div class="card-label">🔔 Giờ thông báo (tối đa 5)</div>
    <div id="time-list"></div>
    <button class="add-btn" id="add-time-btn" onclick="addTime()">+ Thêm giờ học</button>
  </div>

  <div class="card">
    <div class="card-label">🔁 Số lần nhắc mỗi ngày</div>
    <div class="freq-grid" id="freq-grid">
      <button class="freq-btn on" onclick="setFreq(1,this)">1 lần / ngày</button>
      <button class="freq-btn" onclick="setFreq(2,this)">2 lần / ngày</button>
      <button class="freq-btn" onclick="setFreq(3,this)">3 lần / ngày</button>
      <button class="freq-btn" onclick="setFreq(5,this)">5 lần / ngày</button>
    </div>
  </div>

  <button class="primary-btn" onclick="saveSettings()">💾 Lưu cài đặt</button>
</div>

<!-- ════ TAB: WORDS ════ -->
<div id="tab-words" class="content">
  <div class="stats">
    <div class="stat"><div class="stat-n" id="st-total">0</div><div class="stat-l">Từ đã học</div></div>
    <div class="stat"><div class="stat-n" id="st-days">0</div><div class="stat-l">Ngày học</div></div>
  </div>

  <button class="ghost-btn" id="gen-btn" onclick="generateWords()">✨ Sinh 15 từ vựng hôm nay</button>

  <div id="prompt-section" style="display:none;margin-bottom:16px">
    <div class="card-label" style="margin-bottom:6px">Prompt AI đã dùng:</div>
    <div class="prompt-pre" id="prompt-display"></div>
    <button class="copy-btn" onclick="copyPrompt()">📋 Copy prompt</button>
  </div>

  <div id="word-list"></div>
</div>

<!-- ════ TAB: QUIZ ════ -->
<div id="tab-quiz" class="content">
  <div id="quiz-area"></div>
</div>

<script>
var S = {
  times: ['12:00'],
  freq: 1,
  industry: '',
  words: [],
  qIdx: 0,
  qList: [],
  qScore: 0,
  answered: false
};
try { var _s = JSON.parse(localStorage.getItem('vq2')||'{}'); Object.assign(S,_s); } catch(e){}
function persist(){ try{ localStorage.setItem('vq2', JSON.stringify(S)); }catch(e){} }

/* ── TABS ── */
function tab(name, btn){
  document.querySelectorAll('.content').forEach(function(c){ c.classList.remove('on'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('on'); });
  document.getElementById('tab-'+name).classList.add('on');
  btn.classList.add('on');
  if(name==='quiz') initQuiz();
  if(name==='words') renderWords();
  updateBadge();
}

/* ── SETTINGS ── */
function renderTimes(){
  var el = document.getElementById('time-list');
  el.innerHTML = S.times.map(function(t,i){
    return '<div class="time-row"><input type="time" value="'+t+'" onchange="S.times['+i+']=this.value">'
      +(S.times.length>1 ? '<button class="del-btn" onclick="removeTime('+i+')">✕</button>' : '')
      +'</div>';
  }).join('');
  document.getElementById('add-time-btn').style.display = S.times.length>=5?'none':'block';
}
function addTime(){ if(S.times.length>=5)return; S.times.push('08:00'); renderTimes(); }
function removeTime(i){ S.times.splice(i,1); renderTimes(); }
function setFreq(n,btn){
  S.freq=n;
  document.querySelectorAll('.freq-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
}
function saveSettings(){
  S.industry = document.getElementById('industry').value.trim();
  persist();
  var b = document.querySelector('.primary-btn');
  b.textContent='✅ Đã lưu!'; b.disabled=true;
  updateBadge();
  setTimeout(function(){ b.textContent='💾 Lưu cài đặt'; b.disabled=false; }, 1500);
}
function updateBadge(){
  document.getElementById('streak-badge').textContent = S.words.length + ' từ';
  var st = document.getElementById('st-total');
  var sd = document.getElementById('st-days');
  if(st){ st.textContent = S.words.length; }
  if(sd){ sd.textContent = Math.ceil(S.words.length/15)||0; }
}

/* ── GENERATE WORDS ── */
function buildPrompt(){
  var review = '';
  if(S.words.length > 0){
    var old = S.words.slice(-10);
    review = '\n\nCác từ cũ cần ôn lại ('+S.words.length+' từ đã học, lấy 10 từ gần nhất):\n'
      + old.map(function(w){ return '- '+w.word+': '+w.meaning; }).join('\n');
  }
  return 'Hãy đóng vai giáo viên tiếng Anh cho người đi làm. Tạo 15 từ/cụm từ tiếng Anh thường dùng trong công việc thuộc lĩnh vực '+(S.industry||'tổng hợp')+'.\n\nVới mỗi từ, trình bày:\n1. Nghĩa tiếng Việt dễ hiểu\n2. Ví dụ thực tế trong công việc\n3. Tình huống sử dụng: email, họp, báo cáo, trao đổi KH/đồng nghiệp\n4. Lỗi sai người Việt thường mắc\n5. Gợi ý ghi nhớ nhanh\n\nTRẢ LỜI CHỈ JSON ARRAY, không markdown, không giải thích:\n[{"word":"...","meaning":"...","example":"...","situation":"...","mistake":"...","tip":"...","options":["sai 1","đúng","sai 2","sai 3"],"answer":1}]'+review;
}

function generateWords(){
  var btn = document.getElementById('gen-btn');
  btn.innerHTML='<span class="spinner"></span>Đang sinh từ vựng...'; btn.disabled=true;
  var prompt = buildPrompt();
  document.getElementById('prompt-display').textContent = prompt;
  document.getElementById('prompt-section').style.display='block';

  fetch('/api/claude',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      messages:[{role:'user',content:prompt}]
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    var text = (data.content||[]).map(function(c){ return c.text||''; }).join('');
    var clean = text
      .replace(/```json/g,'')
      .replace(/```/g,'')
      .trim();
    var start = clean.indexOf('[');
    var end = clean.lastIndexOf(']');
    if(start === -1 || end === -1) throw new Error('Raw: ' + text.substring(0,200));
    clean = clean.substring(start, end+1);
    var arr = JSON.parse(clean);
    var day = Math.floor(S.words.length/15)+1;
    arr.forEach(function(w){ w.day=day; });
    S.words = S.words.concat(arr);
    persist(); renderWords(); updateBadge();
    btn.innerHTML='✨ Sinh 15 từ vựng hôm nay'; btn.disabled=false;
  })
  .catch(function(err){
    btn.innerHTML='⚠️ Lỗi — thử lại'; btn.disabled=false;
    console.error('Lỗi:', err);
    alert('Lỗi sinh từ vựng: ' + err.message + '\nVui lòng thử lại!');
  });
}

function renderWords(){
  updateBadge();
  var el = document.getElementById('word-list');
  if(!S.words.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📚</div>Chưa có từ vựng nào.<br>Nhấn "Sinh từ vựng" để bắt đầu!</div>';
    return;
  }
  var grouped={};
  S.words.forEach(function(w){ var d=w.day||1; if(!grouped[d]) grouped[d]=[]; grouped[d].push(w); });
  var html='';
  Object.keys(grouped).sort(function(a,b){return b-a;}).forEach(function(d){
    html+='<div class="day-label">Ngày '+d+' — '+grouped[d].length+' từ</div>';
    grouped[d].forEach(function(w){
      html+='<div class="word-item">'
        +'<div class="w-tag">'+(w.day?'Ngày '+w.day:'')+'</div>'
        +'<div class="w-en">'+w.word+'</div>'
        +'<div class="w-vn">'+w.meaning+'</div>';
      if(w.example) html+='<div class="w-detail"><b>Ví dụ:</b> '+w.example+'</div>';
      if(w.situation) html+='<div class="w-detail"><b>Dùng khi:</b> '+w.situation+'</div>';
      if(w.mistake) html+='<div class="w-detail w-mistake"><b>Lỗi hay gặp:</b> '+w.mistake+'</div>';
      if(w.tip) html+='<div class="w-detail w-tip"><b>Ghi nhớ:</b> '+w.tip+'</div>';
      html+='</div>';
    });
  });
  el.innerHTML=html;
}

function copyPrompt(){
  var txt = document.getElementById('prompt-display').textContent;
  if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(function(){
    var b=document.querySelector('.copy-btn');
    b.textContent='✅ Đã copy!';
    setTimeout(function(){ b.textContent='📋 Copy prompt'; },1500);
  }); }
}

/* ── QUIZ ── */
function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

function initQuiz(){
  if(!S.words.length){
    document.getElementById('quiz-area').innerHTML='<div class="empty"><div class="empty-icon">🧠</div>Chưa có từ để luyện tập.<br>Hãy sinh từ vựng trước!</div>';
    return;
  }
  if(!S.qList.length || S.qIdx>=Math.min(S.qList.length,10)){
    S.qList = shuffle(S.words);
    S.qIdx=0; S.qScore=0;
  }
  renderQuestion();
}

function renderQuestion(){
  var total = Math.min(S.qList.length,10);
  var w = S.qList[S.qIdx];
  var pct = Math.round((S.qIdx/total)*100);
  S.answered=false;

  var opts = (w.options||[w.meaning,'...','...','...']).map(function(o,i){
    return '<button class="opt" onclick="checkAns('+i+','+w.answer+',this)">'+o+'</button>';
  }).join('');

  document.getElementById('quiz-area').innerHTML=
    '<div class="quiz-wrap">'
    +'<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:'+pct+'%"></div></div>'
    +'<div class="quiz-meta"><span class="quiz-counter">'+(S.qIdx+1)+' / '+total+'</span><span class="quiz-score">+'+S.qScore+'</span></div>'
    +'<div class="quiz-word">'+w.word+'</div>'
    +'<div class="quiz-hint">Chọn nghĩa đúng trong tiếng Việt</div>'
    +'<div class="opts">'+opts+'</div>'
    +'<div id="q-result"></div>'
    +'</div>';
}

function checkAns(chosen, correct, btn){
  if(S.answered) return;
  S.answered=true;
  document.querySelectorAll('.opt').forEach(function(b,i){
    b.disabled=true;
    if(i===correct) b.classList.add('correct');
    else if(i===chosen && chosen!==correct) b.classList.add('wrong');
  });
  var w = S.qList[S.qIdx];
  var ok = chosen===correct;
  if(ok) S.qScore++;
  var msg = ok
    ? '✅ Chính xác! '+(w.tip?'💡 '+w.tip:'')
    : '❌ Chưa đúng — "'+w.word+'" nghĩa là: '+w.meaning+(w.tip?' | 💡 '+w.tip:'');
  var total=Math.min(S.qList.length,10);
  document.getElementById('q-result').innerHTML=
    '<div class="result-msg '+(ok?'ok':'no')+'">'+msg+'</div>'
    +'<button class="next-btn" onclick="nextQ()">'
    +(S.qIdx+1>=total?'Xem kết quả →':'Tiếp theo →')+'</button>';
  persist();
}

function nextQ(){
  S.qIdx++;
  var total=Math.min(S.qList.length,10);
  if(S.qIdx>=total){
    var pct=Math.round((S.qScore/total)*100);
    var emoji = pct>=80?'🎉':pct>=50?'💪':'📖';
    document.getElementById('quiz-area').innerHTML=
      '<div class="score-screen">'
      +'<div class="big-score">'+S.qScore+'/'+total+'</div>'
      +'<div class="score-label">'+emoji+' '+(pct>=80?'Xuất sắc!':pct>=50?'Khá tốt!':'Cần ôn thêm nhé')+'</div>'
      +'<button class="primary-btn" onclick="S.qList=[];S.qIdx=0;S.qScore=0;persist();initQuiz()">🔁 Luyện lại</button>'
      +'</div>';
    return;
  }
  renderQuestion();
}

/* ── INIT ── */
document.getElementById('industry').value = S.industry||'';
renderTimes(); updateBadge();
</script>
</body>
