<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Vocab Quiz Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d12;
  --s1: #14141c;
  --s2: #1c1c28;
  --s3: #242434;
  --bd: rgba(255,255,255,0.07);
  --bd2: rgba(255,255,255,0.13);
  --t1: #f2f2f8;
  --t2: #9898b8;
  --t3: #5a5a7a;
  --a: #7f77dd;
  --a2: #1d9e75;
  --a3: #d85a30;
  --r: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
html, body { background: var(--bg); color: var(--t1); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overscroll-behavior: none; -webkit-overflow-scrolling: touch; }

/* HEADER */
.hdr { padding: 52px 20px 0; }
.hdr-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
.app-name { font-family: 'Playfair Display', serif; font-size: 28px; letter-spacing: -0.5px; line-height: 1.1; }
.app-name span { color: var(--a); }
.pill { background: var(--s2); border: 1px solid var(--bd2); border-radius: 20px; padding: 5px 14px; font-size: 13px; color: var(--a2); font-weight: 500; }

/* TABS */
.tabs { display: flex; border-bottom: 1px solid var(--bd); }
.tab { flex: 1; padding: 12px 4px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--t3); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; letter-spacing: .02em; transition: color .2s, border-color .2s; }
.tab.on { color: var(--a); border-bottom-color: var(--a); }

/* PANES */
.pane { display: none; }
.pane.on { display: block; }

/* INDUSTRY SELECT */
.sel-wrap { padding: 20px 20px 0; }
.sel-label { font-size: 11px; font-weight: 600; letter-spacing: .09em; text-transform: uppercase; color: var(--t3); margin-bottom: 10px; display: block; }
.sel-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.sel-row::-webkit-scrollbar { display: none; }
.sel-chip { flex-shrink: 0; padding: 8px 16px; background: var(--s2); border: 1px solid var(--bd); border-radius: 20px; color: var(--t2); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all .2s; }
.sel-chip.on { background: rgba(127,119,221,.15); border-color: var(--a); color: var(--a); }

/* FLIP CARD */
.card-wrap { padding: 20px; }
.progress-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.prog-txt { font-size: 13px; color: var(--t3); }
.prog-bar { flex: 1; height: 3px; background: var(--s3); border-radius: 2px; margin: 0 12px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--a); border-radius: 2px; transition: width .4s ease; }

.flip-scene { width: 100%; perspective: 1000px; margin-bottom: 16px; }
.flip-card { width: 100%; min-height: 280px; position: relative; transform-style: preserve-3d; transition: transform .6s cubic-bezier(.4,0,.2,1); cursor: pointer; }
.flip-card.flipped { transform: rotateY(180deg); }
.flip-front, .flip-back { position: absolute; width: 100%; min-height: 280px; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: var(--r); padding: 28px 24px; display: flex; flex-direction: column; }
.flip-front { background: var(--s1); border: 1px solid var(--bd); }
.flip-back { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); border: 1px solid rgba(127,119,221,.25); transform: rotateY(180deg); }

/* FRONT */
.card-industry { font-size: 11px; font-weight: 600; letter-spacing: .09em; text-transform: uppercase; color: var(--a); margin-bottom: 20px; }
.card-word { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 700; color: var(--t1); line-height: 1.1; margin-bottom: 12px; }
.card-phonetic { font-size: 15px; color: var(--t3); margin-bottom: auto; font-style: italic; }
.card-hint { margin-top: 24px; font-size: 13px; color: var(--t3); text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; }
.card-hint::before, .card-hint::after { content: ''; flex: 1; height: 1px; background: var(--bd); }

/* BACK */
.card-meaning { font-family: 'Playfair Display', serif; font-size: 26px; color: #a5d8f3; margin-bottom: 8px; line-height: 1.2; }
.card-meaning-sub { font-size: 14px; color: rgba(165,216,243,.6); margin-bottom: 20px; }
.card-divider { height: 1px; background: rgba(255,255,255,.08); margin-bottom: 16px; }
.card-row { display: flex; flex-direction: column; gap: 10px; }
.card-field { font-size: 13px; line-height: 1.6; }
.card-field-lbl { color: rgba(255,255,255,.35); font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; display: block; margin-bottom: 3px; }
.card-field-val { color: rgba(255,255,255,.85); }
.card-field-val.tip { color: #9fe1cb; }
.card-field-val.err { color: #f0997b; }

/* NAV BUTTONS */
.nav-row { display: flex; gap: 10px; }
.nav-btn { flex: 1; padding: 14px; background: var(--s2); border: 1px solid var(--bd); border-radius: 12px; color: var(--t2); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all .15s; }
.nav-btn:active { transform: scale(.97); background: var(--s3); }
.nav-btn.primary { background: rgba(127,119,221,.15); border-color: var(--a); color: var(--a); }

/* GRAMMAR SECTION */
.grammar-wrap { padding: 0 20px 32px; }
.section-title { font-size: 13px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--t3); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--bd); }
.grammar-card { background: var(--s1); border: 1px solid var(--bd); border-radius: var(--r); overflow: hidden; margin-bottom: 10px; }
.grammar-hdr { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.grammar-hdr-left { display: flex; flex-direction: column; gap: 3px; }
.grammar-tag { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--a2); }
.grammar-title { font-size: 15px; font-weight: 500; color: var(--t1); }
.grammar-arrow { color: var(--t3); font-size: 18px; transition: transform .25s; }
.grammar-arrow.open { transform: rotate(180deg); }
.grammar-body { display: none; padding: 0 16px 16px; }
.grammar-body.open { display: block; }
.grammar-rule { font-size: 14px; color: var(--t2); line-height: 1.7; margin-bottom: 12px; }
.grammar-rule b { color: var(--t1); font-weight: 500; }
.grammar-ex { background: var(--s2); border-left: 2px solid var(--a); border-radius: 0 8px 8px 0; padding: 10px 14px; margin-bottom: 8px; }
.grammar-ex-en { font-size: 14px; color: var(--t1); margin-bottom: 2px; font-style: italic; }
.grammar-ex-vi { font-size: 13px; color: var(--t3); }
.grammar-note { background: rgba(29,158,117,.08); border: 1px solid rgba(29,158,117,.2); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #9fe1cb; line-height: 1.6; margin-top: 8px; }

/* QUIZ */
.quiz-wrap { padding: 20px; }
.q-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.q-cnt { font-size: 13px; color: var(--t3); }
.q-sc { font-size: 13px; font-weight: 600; color: var(--a2); background: rgba(29,158,117,.1); border: 1px solid rgba(29,158,117,.2); padding: 4px 12px; border-radius: 20px; }
.q-prog { height: 3px; background: var(--s3); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
.q-fill { height: 100%; background: var(--a); border-radius: 2px; transition: width .4s; }
.q-word { font-family: 'Playfair Display', serif; font-size: 40px; text-align: center; padding: 16px 0 6px; line-height: 1.1; }
.q-sub { text-align: center; font-size: 13px; color: var(--t3); margin-bottom: 28px; }
.opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
.opt { width: 100%; padding: 16px 18px; background: var(--s1); border: 1px solid var(--bd); border-radius: 12px; color: var(--t1); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; text-align: left; cursor: pointer; transition: all .15s; line-height: 1.4; }
.opt:active:not(:disabled) { transform: scale(.98); }
.opt.correct { background: rgba(29,158,117,.12); border-color: var(--a2); color: #9fe1cb; }
.opt.wrong { background: rgba(216,90,48,.12); border-color: var(--a3); color: #f0997b; }
.opt:disabled { cursor: default; }
.res-box { border-radius: 12px; padding: 14px 16px; font-size: 14px; line-height: 1.6; margin-bottom: 10px; }
.res-box.ok { background: rgba(29,158,117,.1); border: 1px solid rgba(29,158,117,.2); color: #9fe1cb; }
.res-box.no { background: rgba(216,90,48,.1); border: 1px solid rgba(216,90,48,.2); color: #f0997b; }
.next-btn { width: 100%; padding: 14px; background: var(--s2); border: 1px solid var(--bd2); border-radius: 12px; color: var(--t1); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; }
.score-screen { text-align: center; padding: 40px 0 20px; }
.big-num { font-family: 'Playfair Display', serif; font-size: 80px; color: var(--a); line-height: 1; }
.big-denom { font-size: 24px; color: var(--t3); margin-bottom: 8px; }
.score-msg { font-size: 16px; color: var(--t2); margin-bottom: 32px; }
.retry-btn { width: 100%; padding: 16px; background: var(--a); border: none; border-radius: 14px; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; }

/* EMPTY */
.empty { text-align: center; padding: 64px 24px; color: var(--t3); font-size: 15px; line-height: 1.7; }
.empty-icon { font-size: 52px; margin-bottom: 16px; }

/* WORD COUNT BADGE */
.wc-row { display: flex; gap: 8px; padding: 12px 20px 0; }
.wc-badge { background: var(--s2); border: 1px solid var(--bd); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--t2); }
.wc-badge b { color: var(--t1); }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="app-name">Vocab<span>Pro</span></div>
    <div class="pill" id="hdr-pill">0 từ</div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="goTab('cards',this)">Thẻ từ</button>
    <button class="tab" onclick="goTab('quiz',this)">Quiz</button>
  </div>
</div>

<!-- CARDS TAB -->
<div id="tab-cards" class="pane on">
  <div class="sel-wrap">
    <span class="sel-label">Ngành nghề</span>
    <div class="sel-row" id="industry-chips"></div>
  </div>
  <div class="wc-row" id="wc-row"></div>
  <div class="card-wrap" id="card-area"></div>
  <div class="grammar-wrap">
    <div class="section-title">Ngữ pháp liên quan</div>
    <div id="grammar-area"></div>
  </div>
</div>

<!-- QUIZ TAB -->
<div id="tab-quiz" class="pane">
  <div class="quiz-wrap" id="quiz-area"></div>
</div>

  {tag:"Đề xuất",title:"Cách trình bày ý kiến lịch sự",rule:"Dùng <b>I'd suggest / It might be worth / Have you considered</b>",examples:[{en:"I'd suggest we push the deadline by one week.",vi:"Tôi đề xuất gia hạn deadline thêm một tuần."},{en:"Have you considered outsourcing this part of the project?",vi:"Bạn có xem xét thuê ngoài phần này của dự án không?"}],note:"💡 Câu hỏi ('Have you considered...') ít gây phòng thủ hơn câu khẳng định ('You should...')"}
],
healthcare:[
  {tag:"Giao tiếp",title:"Giải thích tình trạng bệnh cho BN",rule:"Dùng ngôn ngữ đơn giản: <b>What this means is / In other words / Think of it as</b>",examples:[{en:"Your blood pressure is high. What this means is your heart is working harder than it should.",vi:"Huyết áp của bạn cao. Điều này có nghĩa là tim bạn đang làm việc khó hơn mức cần thiết."},{en:"Think of your arteries as pipes. When they narrow, blood flow decreases.",vi:"Hãy nghĩ động mạch như ống nước. Khi chúng hẹp lại, lưu lượng máu giảm."}],note:"💡 Tránh dùng thuật ngữ y khoa mà không giải thích — BN sẽ không hiểu và không tuân thủ điều trị"}
],
logistics:[
  {tag:"Theo dõi",title:"Cập nhật trạng thái đơn hàng",rule:"Dùng <b>is currently / has been / is expected to</b> để cập nhật tiến độ vận chuyển",examples:[{en:"Your shipment is currently in customs clearance.",vi:"Lô hàng của bạn hiện đang trong quá trình thông quan."},{en:"The package is expected to arrive by Friday.",vi:"Gói hàng dự kiến sẽ đến vào thứ Sáu."}],note:"💡 'Is expected to' (dự kiến) nhẹ hơn 'will' — tốt hơn khi ETA còn có thể thay đổi"}
],
legal:[
  {tag:"Hợp đồng",title:"Ngôn ngữ hợp đồng tiêu chuẩn",rule:"Hợp đồng dùng <b>shall (bắt buộc) / may (được phép) / shall not (cấm)</b>",examples:[{en:"The contractor shall deliver the goods within 30 days.",vi:"Nhà thầu phải giao hàng trong vòng 30 ngày."},{en:"Either party may terminate this agreement with 30 days notice.",vi:"Một trong hai bên có thể chấm dứt thỏa thuận này với thông báo 30 ngày."}],note:"💡 'Shall' trong hợp đồng = bắt buộc (mạnh hơn 'must'). Đọc kỹ — mỗi từ đều có ý nghĩa pháp lý"}
],
education:[
  {tag:"Giảng dạy",title:"Hướng dẫn và giải thích",rule:"Dùng <b>Let's look at / What this means is / As you can see</b> khi giảng dạy",examples:[{en:"Let's look at an example to make this clearer.",vi:"Hãy xem một ví dụ để làm rõ điều này."},{en:"As you can see from the diagram, the process has three stages.",vi:"Như bạn thấy trong sơ đồ, quy trình có ba giai đoạn."}],note:"💡 'Let's' tạo cảm giác cùng nhau khám phá, không phải thầy dạy trò — rất hiệu quả trong lớp học"}
],
construction:[
  {tag:"Dự án",title:"Báo cáo tiến độ thi công",rule:"Dùng <b>is on track / has been completed / is behind schedule</b>",examples:[{en:"The foundation work has been completed ahead of schedule.",vi:"Công tác thi công móng đã hoàn thành trước tiến độ."},{en:"Electrical installation is currently behind schedule due to material delays.",vi:"Lắp đặt điện hiện đang chậm tiến độ do chậm vật liệu."}],note:"💡 Luôn kèm lý do khi báo cáo chậm tiến độ ('due to...') — chuyên nghiệp và cụ thể hơn"}
]
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
var S = {industry:'it', cardIdx:0, flipped:false, qList:[], qIdx:0, qScore:0, answered:false};
try { var _s = JSON.parse(localStorage.getItem('vqpv4')||'{}'); if(_s.industry) S.industry=_s.industry; } catch(e){}
function save() { try { localStorage.setItem('vqpv4', JSON.stringify({industry:S.industry})); } catch(e){} }

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
function goTab(name, btn) {
  document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById('tab-'+name).classList.add('on');
  btn.classList.add('on');
  if(name==='quiz') initQuiz();
}

// ═══════════════════════════════════════════
// INDUSTRY CHIPS
// ═══════════════════════════════════════════
function renderChips() {
  var el = document.getElementById('industry-chips');
  el.innerHTML = Object.keys(INDUSTRIES).map(function(k) {
    return '<button class="sel-chip'+(k===S.industry?' on':'')+'" onclick="setIndustry(\''+k+'\')">'
      +INDUSTRIES[k]+'</button>';
  }).join('');
}
function setIndustry(k) {
  S.industry = k; S.cardIdx = 0; S.flipped = false;
  save();
  renderChips();
  renderWC();
  renderCard();
  renderGrammar();
}

// ═══════════════════════════════════════════
// WORD COUNT
// ═══════════════════════════════════════════
function renderWC() {
  var words = DB[S.industry]||[];
  document.getElementById('hdr-pill').textContent = words.length + ' từ';
  document.getElementById('wc-row').innerHTML =
    '<div class="wc-badge"><b>'+words.length+'</b> từ vựng</div>'
    +'<div class="wc-badge">'+INDUSTRIES[S.industry]+'</div>';
}

// ═══════════════════════════════════════════
// FLIP CARD
// ═══════════════════════════════════════════
function renderCard() {
  var words = DB[S.industry]||[];
  if(!words.length) {
    document.getElementById('card-area').innerHTML = '<div class="empty"><div class="empty-icon">📚</div>Chưa có từ vựng cho ngành này.</div>';
    return;
  }
  var w = words[S.cardIdx];
  var pct = Math.round(((S.cardIdx+1)/words.length)*100);
  document.getElementById('card-area').innerHTML =
    '<div class="progress-row">'
      +'<span class="prog-txt">'+(S.cardIdx+1)+' / '+words.length+'</span>'
      +'<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>'
      +'<span class="prog-txt">'+pct+'%</span>'
    +'</div>'
    +'<div class="flip-scene"><div class="flip-card" id="fc" onclick="flipCard()">'
      +'<div class="flip-front">'
        +'<div class="card-industry">'+INDUSTRIES[w.industry||S.industry]+'</div>'
        +'<div class="card-word">'+w.word+'</div>'
        +'<div class="card-phonetic">'+(w.phonetic||'')+'</div>'
        +'<div class="card-hint">Tap để xem nghĩa</div>'
      +'</div>'
      +'<div class="flip-back">'
        +'<div class="card-meaning">'+w.meaning+'</div>'
        +'<div class="card-meaning-sub">'+(w.meaning_sub||'')+'</div>'
        +'<div class="card-divider"></div>'
        +'<div class="card-row">'
          +(w.example?'<div class="card-field"><span class="card-field-lbl">Ví dụ</span><span class="card-field-val">'+w.example+'</span></div>':'')
          +(w.situation?'<div class="card-field"><span class="card-field-lbl">Dùng khi</span><span class="card-field-val">'+w.situation+'</span></div>':'')
          +(w.tip?'<div class="card-field"><span class="card-field-lbl">Mẹo nhớ</span><span class="card-field-val tip">💡 '+w.tip+'</span></div>':'')
          +(w.mistake?'<div class="card-field"><span class="card-field-lbl">Lỗi thường gặp</span><span class="card-field-val err">⚠️ '+w.mistake+'</span></div>':'')
        +'</div>'
      +'</div>'
    +'</div></div>'
    +'<div class="nav-row">'
      +'<button class="nav-btn" onclick="prevCard()">← Trước</button>'
      +'<button class="nav-btn primary" onclick="flipCard()">Lật thẻ</button>'
      +'<button class="nav-btn" onclick="nextCard()">Tiếp →</button>'
    +'</div>';
  S.flipped = false;
}
function flipCard() {
  var fc = document.getElementById('fc');
  if(!fc) return;
  S.flipped = !S.flipped;
  fc.classList.toggle('flipped', S.flipped);
}
function nextCard() {
  var words = DB[S.industry]||[];
  S.cardIdx = (S.cardIdx+1) % words.length;
  S.flipped = false;
  renderCard();
}
function prevCard() {
  var words = DB[S.industry]||[];
  S.cardIdx = (S.cardIdx-1+words.length) % words.length;
  S.flipped = false;
  renderCard();
}

// ═══════════════════════════════════════════
// GRAMMAR
// ═══════════════════════════════════════════
function renderGrammar() {
  var items = GRAMMAR[S.industry]||[];
  if(!items.length) { document.getElementById('grammar-area').innerHTML=''; return; }
  document.getElementById('grammar-area').innerHTML = items.map(function(g,i){
    return '<div class="grammar-card">'
      +'<div class="grammar-hdr" onclick="toggleGrammar('+i+')">'
        +'<div class="grammar-hdr-left">'
          +'<span class="grammar-tag">'+g.tag+'</span>'
          +'<span class="grammar-title">'+g.title+'</span>'
        +'</div>'
        +'<span class="grammar-arrow" id="garrow-'+i+'">▾</span>'
      +'</div>'
      +'<div class="grammar-body" id="gbody-'+i+'">'
        +'<div class="grammar-rule">'+g.rule+'</div>'
        +g.examples.map(function(ex){
          return '<div class="grammar-ex">'
            +'<div class="grammar-ex-en">'+ex.en+'</div>'
            +'<div class="grammar-ex-vi">'+ex.vi+'</div>'
          +'</div>';
        }).join('')
        +(g.note?'<div class="grammar-note">'+g.note+'</div>':'')
      +'</div>'
    +'</div>';
  }).join('');
}
function toggleGrammar(i) {
  var body = document.getElementById('gbody-'+i);
  var arrow = document.getElementById('garrow-'+i);
  var isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

// ═══════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════
function shuffle(arr) {
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function initQuiz() {
  var all = [];
  Object.keys(DB).forEach(function(k){ all = all.concat(DB[k]); });
  S.qList = shuffle(all).slice(0,10);
  S.qIdx = 0; S.qScore = 0; S.answered = false;
  renderQ();
}
function renderQ() {
  if(!S.qList.length) { document.getElementById('quiz-area').innerHTML='<div class="empty"><div class="empty-icon">🧠</div>Chưa có từ để luyện!</div>'; return; }
  var total = S.qList.length;
  var w = S.qList[S.qIdx];
  var pct = Math.round((S.qIdx/total)*100);
  S.answered = false;
  document.getElementById('quiz-area').innerHTML =
    '<div class="q-hdr"><span class="q-cnt">'+(S.qIdx+1)+' / '+total+'</span><span class="q-sc">'+S.qScore+' điểm</span></div>'
    +'<div class="q-prog"><div class="q-fill" style="width:'+pct+'%"></div></div>'
    +'<div class="q-word">'+w.word+'</div>'
    +'<div class="q-sub">'+(INDUSTRIES[w.industry||'']||'')+'</div>'
    +'<div class="opts">'
    +w.options.map(function(o,i){
      return '<button class="opt" onclick="checkAns('+i+','+w.answer+',this)">'+o+'</button>';
    }).join('')
    +'</div><div id="q-res"></div>';
}
function checkAns(chosen, correct, btn) {
  if(S.answered) return;
  S.answered = true;
  document.querySelectorAll('.opt').forEach(function(b,i){
    b.disabled=true;
    if(i===correct) b.classList.add('correct');
    else if(i===chosen&&chosen!==correct) b.classList.add('wrong');
  });
  var w = S.qList[S.qIdx];
  var ok = chosen===correct;
  if(ok) S.qScore++;
  var msg = ok
    ? '✅ Chính xác! '+(w.tip?'💡 '+w.tip:'')
    : '❌ Chưa đúng — <b>'+w.word+'</b> = '+w.meaning+(w.tip?' | 💡 '+w.tip:'');
  document.getElementById('q-res').innerHTML =
    '<div class="res-box '+(ok?'ok':'no')+'">'+msg+'</div>'
    +'<button class="next-btn" onclick="nextQ()">'+(S.qIdx+1>=S.qList.length?'Xem kết quả →':'Câu tiếp →')+'</button>';
}
function nextQ() {
  S.qIdx++;
  if(S.qIdx>=S.qList.length) {
    var total=S.qList.length;
    var pct=Math.round((S.qScore/total)*100);
    var msg = pct>=80?'🎉 Xuất sắc!':pct>=50?'💪 Khá tốt, tiếp tục nhé!':'📖 Cần ôn thêm!';
    document.getElementById('quiz-area').innerHTML=
      '<div class="score-screen">'
      +'<div class="big-num">'+S.qScore+'</div>'
      +'<div class="big-denom">/ '+total+' câu</div>'
      +'<div class="score-msg">'+msg+'</div>'
      +'<button class="retry-btn" onclick="initQuiz()">🔁 Luyện lại</button>'
      +'</div>';
    return;
  }
  renderQ();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderChips();
renderWC();
renderCard();
renderGrammar();
</script>
